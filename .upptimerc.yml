owner: k0kesh
repo: web-cited-status

sites:
  - name: Marketing site
    url: https://web-cited.com
  - name: Marketing site (www)
    url: https://www.web-cited.com
  - name: Audit pipeline
    url: https://audit.web-cited.com/audit/healthz
  - name: Customer artifact CDN
    url: https://artifacts.web-cited.com
    expectedStatusCodes:
      - 200
      - 404
  - name: Intake API
    url: https://api.web-cited.com/health
  - name: Citation Monitor signup
    url: https://web-cited.com/citation-monitor
  - name: Citation Monitor manage
    url: https://web-cited.com/citation-monitor/manage
  - name: Citation Monitor portal route
    # POST endpoint - expect 401 for an invalid token (route exists + auth ran)
    url: https://api.web-cited.com/api/citation-monitor/portal
    method: POST
    body: '{"token":"upptime-probe"}'
    headers:
      - "Content-Type: application/json"
    expectedStatusCodes:
      - 401

status-website:
  cname: status.web-cited.com
  name: Web Cited Status
  introTitle: "Web Cited service status"
  introMessage: "Real-time uptime and response-time monitoring for Web Cited customer-facing services. Updated every 5 minutes by GitHub Actions. For incidents, see the GitHub Issues tab."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/k0kesh/web-cited-status

assignees:
  - k0kesh
